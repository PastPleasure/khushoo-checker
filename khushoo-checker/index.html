<!DOCTYPE html>
<html>
  <head>
    <title>Login with Google</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCRK2UID5xTNAAVrG7p6D9G_Erf37xB-So",
        authDomain: "khushoo-checker.firebaseapp.com",
        projectId: "khushoo-checker",
        appId: "1:173770170847:web:a732dbb684fb9490c87e2"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      signInWithPopup(auth, provider).then(result => {
        return result.user.getIdToken();
      }).then(token => {
        window.location.href = "https://khushoo-checker.streamlit.app/?token=" + token;
      }).catch(error => {
        document.body.innerHTML = "Login failed: " + error.message;
      });
    </script>
  </head>
  <body>
    <h2>Redirecting to Google Login...</h2>
  </body>
</html>
